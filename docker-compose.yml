services:
  icloudpd:
    image: boredazfcuk/icloudpd:latest
    container_name: icloudpd
    restart: unless-stopped
    volumes:
      - icloudpd-photos:/home/user/iCloud
      - icloudpd-config:/config
    environment:
      - apple_id=${APPLE_ID}
      - TZ=${TZ:-Asia/Seoul}
      - authentication_type=Web
      - download_path=/home/user/iCloud
      - download_interval=${ICLOUD_INTERVAL:-43200}
      - photo_album=${ALBUM_NAME}
      - skip_videos=true
      - convert_heic_to_jpeg=true
      - jpeg_quality=90
      - notification_type=${NOTIFICATION_TYPE:-}
      - telegram_token=${TELEGRAM_TOKEN:-}
      - telegram_chat_id=${TELEGRAM_CHAT_ID:-}

  sync-to-r2:
    build: ./sync
    container_name: sync-to-r2
    restart: unless-stopped
    depends_on:
      - icloudpd
    volumes:
      - icloudpd-photos:/photos:ro
    env_file:
      - .env

volumes:
  icloudpd-photos:
  icloudpd-config:
